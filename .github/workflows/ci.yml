name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps
      - run: pnpm check:ci
      - run: pnpm lint:eslint
      - run: pnpm spellcheck
      - run: pnpm test
      - run: pnpm test:e2e
      - run: pnpm build
      - run: pnpm audit --prod
